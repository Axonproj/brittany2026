<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Possible Sailing Routes Around North Brittany, May 2026</title>
    <style>
        body { margin: 0; background: #222; color: #ddd; font-family: sans-serif; }
        header { padding: 16px 24px 8px; }
        h1 { margin: 0 0 8px; font-size: 1.4em; color: #fff; }
        .above { margin: 0; font-size: 0.95em; color: #bbb; }
        #container { width: calc(100vw - 48px); height: 70vh; cursor: grab; overflow: hidden; margin: 0 24px; box-sizing: border-box; border: 2px solid #556; }
        #container:active { cursor: grabbing; }
        #container svg { width: 100%; height: 100%; display: block; }
        footer { padding: 8px 24px 16px; font-size: 0.95em; color: #bbb; }
    </style>
</head>
<body>
    <header>
        <h1>Possible Sailing Routes Around North Brittany, May 2026</h1>
        <p class="above">Placeholder above</p>
    </header>
    <div id="container"></div>
    <footer>
        <div id="svg-time" style="font-size:0.8em; color:#888; margin-bottom:6px;"></div>
        Placeholder below
    </footer>
    <script>
        fetch('sailing_routes.svg')
            .then(r => {
                const mod = r.headers.get('Last-Modified');
                if (mod) {
                    document.getElementById('svg-time').textContent =
                        'Map generated: ' + new Date(mod).toLocaleString();
                }
                return r.text();
            })
            .then(svgText => {
                const container = document.getElementById('container');
                container.innerHTML = svgText;
                const svg = container.querySelector('svg');

                // Remove fixed dimensions so viewBox drives layout
                svg.removeAttribute('width');
                svg.removeAttribute('height');

                // Parse initial viewBox
                const vb = svg.getAttribute('viewBox').split(' ').map(Number);
                let vx = vb[0], vy = vb[1], vw = vb[2], vh = vb[3];

                function applyViewBox() {
                    svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
                }

                container.addEventListener('wheel', e => {
                    e.preventDefault();
                    const rect = container.getBoundingClientRect();
                    // Cursor position as fraction of container
                    const fx = (e.clientX - rect.left) / rect.width;
                    const fy = (e.clientY - rect.top)  / rect.height;
                    const factor = e.deltaY < 0 ? 1 / 1.05 : 1.05;
                    const newW = vw * factor;
                    const newH = vh * factor;
                    vx += (vw - newW) * fx;
                    vy += (vh - newH) * fy;
                    vw = newW;
                    vh = newH;
                    applyViewBox();
                }, { passive: false });

                let dragging = false, dragX, dragY, dragVx, dragVy;

                container.addEventListener('mousedown', e => {
                    dragging = true;
                    dragX = e.clientX; dragY = e.clientY;
                    dragVx = vx; dragVy = vy;
                    svg.style.pointerEvents = 'none';
                });
                window.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const rect = container.getBoundingClientRect();
                    vx = dragVx - (e.clientX - dragX) / rect.width  * vw;
                    vy = dragVy - (e.clientY - dragY) / rect.height * vh;
                    applyViewBox();
                });
                window.addEventListener('mouseup', () => {
                    dragging = false;
                    svg.style.pointerEvents = '';
                });
            });
    </script>
</body>
</html>
