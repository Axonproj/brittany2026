<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Possible Sailing Routes Around North Brittany, May 2026</title>
    <style>
        body { margin: 0; background: #222; color: #ddd; font-family: sans-serif; }
        header { padding: 16px 24px 8px; }
        h1 { margin: 0 0 8px; font-size: 1.4em; color: #fff; }
        .above { margin: 0; font-size: 0.95em; color: #bbb; }
        #container { width: 100vw; height: 70vh; cursor: grab; overflow: hidden; }
        #container:active { cursor: grabbing; }
        #container svg { width: 100%; height: 100%; will-change: transform; }
        footer { padding: 8px 24px 16px; font-size: 0.95em; color: #bbb; }
    </style>
</head>
<body>
    <header>
        <h1>Possible Sailing Routes Around North Brittany, May 2026</h1>
        <p class="above">Placeholder above</p>
    </header>
    <div id="container"></div>
    <footer>Placeholder below</footer>
    <script>
        fetch('sailing_routes.svg')
            .then(r => r.text())
            .then(svgText => {
                const container = document.getElementById('container');
                container.innerHTML = svgText;
                const svg = container.querySelector('svg');

                let scale = 1, tx = 0, ty = 0;
                let dragging = false, startX, startY;

                function applyTransform() {
                    svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                    svg.style.transformOrigin = '0 0';
                }

                container.addEventListener('wheel', e => {
                    e.preventDefault();
                    const rect = svg.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    const factor = e.deltaY < 0 ? 1.05 : 1 / 1.05;
                    tx -= mx * (factor - 1);
                    ty -= my * (factor - 1);
                    scale *= factor;
                    applyTransform();
                }, { passive: false });

                container.addEventListener('mousedown', e => {
                    dragging = true;
                    svg.style.pointerEvents = 'none';
                    startX = e.clientX - tx;
                    startY = e.clientY - ty;
                });
                window.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    tx = e.clientX - startX;
                    ty = e.clientY - startY;
                    applyTransform();
                });
                window.addEventListener('mouseup', () => {
                    dragging = false;
                    svg.style.pointerEvents = '';
                });
            });
    </script>
</body>
</html>
